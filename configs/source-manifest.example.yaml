version: 1
project: ocp-operations-assistant-v2

sources:
  - id: openshift-docs
    enabled: true
    type: git_mirror
    source_url: https://github.com/openshift/openshift-docs
    local_path: ../openshift-docs
    trust_level: official
    product: ocp
    language: en
    include:
      - "**/*.adoc"
    exclude:
      - "**/_unused/**"
      - "**/images/**"
      - "**/modules/snippets/**"

  - id: internal-ocp-guides
    enabled: true
    type: file_tree
    local_path: ../internal-ocp-docs
    trust_level: internal_runbook
    product: ocp
    language: ko
    include:
      - "**/*.md"
      - "**/*.pdf"
      - "**/*.docx"

collection:
  output_manifest_dir: ./data/manifests
  normalized_dir: ./data/normalized
  package_dir: ./data/packages
