version: 1

required_fields:
  - document_id
  - title
  - source_id
  - source_type
  - source_mirror_id
  - source_profile_id
  - source_url
  - source_git_ref
  - source_git_commit
  - local_path
  - normalized_path
  - product
  - version
  - category
  - language
  - trust_level
  - collected_at
  - checksum

recommended_fields:
  - summary
  - tags
  - last_modified_at
  - release_stream
  - audience
  - visibility
  - top_level_dir
  - html_path
  - section_count
  - sections
  - section_title
  - heading_hierarchy
  - viewer_url
  - target_minor

field_notes:
  document_id: stable identifier derived from source path
  title: normalized document title
  source_id: source name from source-manifest.yaml
  source_type: git_mirror, file_tree, export_bundle, or manual
  source_mirror_id: source mirror identifier from source-profiles.yaml
  source_profile_id: resolved source profile identifier used for this normalization run
  source_url: original retrieval URL when available
  source_git_ref: declared git ref expected by the resolved source profile
  source_git_commit: detected git commit used for this normalized snapshot
  local_path: absolute or workspace-local path to source document
  normalized_path: path to normalized file used for indexing
  product: ocp, okd, rosa, osd, or internal
  version: source document version label or approved stream label
  target_minor: approved target minor when the system leaves validation mode
  category: install, upgrade, networking, security, storage, troubleshooting, or other
  language: ko, en, or other ISO language code
  trust_level: official, internal_runbook, training, or reference
  collected_at: ISO-8601 collection timestamp
  checksum: SHA-256 of normalized content
  html_path: absolute or workspace-local path to the generated HTML citation document
  section_count: number of extracted sections in the canonical document model
  sections: section metadata records used for citation alignment and future chunk emission
  section_title: nearest section title for citation targeting
  heading_hierarchy: ordered heading path used for chunk and citation alignment
  viewer_url: internal HTML document path used when a citation is clicked
