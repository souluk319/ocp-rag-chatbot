version: 2

answering:
  default_language: ko
  require_citations: true
  refuse_if_ungrounded: true
  preserve_technical_terms: true
  disclose_version_uncertainty: true
  operations_conservative_notice: "공식 OCP 문서 기준으로 확인된 내용만 답변합니다."
  ungrounded_response_ko: "현재 확보된 공식 OCP 문서 근거만으로는 확답할 수 없습니다. 관련 문서나 버전을 더 지정해 주세요."
  citation_style:
    prefer_section_level: true
    max_sources: 3

modes:
  operations:
    tone: concise
    response_format: checklist
    prefer_recent_versions: true
    allow_speculation: false
    require_risk_notice_for:
      - upgrade
      - security
      - troubleshooting
  study:
    tone: explanatory
    response_format: guided_summary
    prefer_recent_versions: true
    allow_speculation: false
    require_risk_notice_for:
      - upgrade
      - security

retrieval:
  base_similarity_multiplier: 100.0
  source_priority:
    official: 100
    internal_runbook: 90
    training: 70
    reference: 50
  source_dir_priority:
    installing: 92
    post_installation_configuration: 96
    disconnected: 98
    support: 97
  category_priority:
    troubleshooting: 100
    upgrade: 98
    security: 96
    networking: 94
    storage: 92
    install: 92
    other: 55
  product_policy:
    allowed_products:
      - ocp
      - internal
    blocked_products:
      - okd
      - rosa
      - osd
      - microshift
  version_policy:
    prefer_exact_match: true
    prefer_latest_minor: true
    reject_unknown_version_mix: true
    allowed_streams:
      - 4.x
    continuity_boost: 8
    mismatch_penalty: 20
    unknown_penalty: 4
  scoring:
    source_dir_match_boost: 9
    source_dir_mismatch_penalty: 3
    category_match_boost: 7
    category_mismatch_penalty: 2
    path_term_boost: 1.5
    memory_source_dir_boost: 8
    memory_category_boost: 4
    memory_document_boost: 6
    blocked_product_penalty: 200
    nonpreferred_product_penalty: 25
  query_signal_rules:
    install_prereq:
      any_terms:
        - 설치
        - install
        - 방화벽
        - firewall
        - 포트
        - domain
        - 도메인
        - 커스터마이징
        - customizing
        - customization
      preferred_categories:
        - install
      preferred_source_dirs:
        - installing
      path_terms:
        - install
        - firewall
        - customize
        - prerequisite
        - customizing
    disconnected_mirroring:
      any_terms:
        - 폐쇄망
        - disconnected
        - oc-mirror
        - 미러
        - mirror
        - registry
      preferred_categories:
        - troubleshooting
      preferred_source_dirs:
        - disconnected
      path_terms:
        - disconnected
        - mirror
        - registry
        - oc-mirror
    troubleshooting_node_health:
      any_terms:
        - 노드 상태
        - node health
        - notready
        - kubelet
      preferred_categories:
        - troubleshooting
      preferred_source_dirs:
        - support
      path_terms:
        - node
        - health
        - kubelet
        - verifying
    troubleshooting_network:
      any_terms:
        - 네트워크
        - network
        - dns
      preferred_categories:
        - troubleshooting
        - networking
      preferred_source_dirs:
        - support
      path_terms:
        - network
        - troubleshooting
    troubleshooting_operator:
      any_terms:
        - operator
        - 오퍼레이터
        - clusteroperator
      preferred_categories:
        - troubleshooting
      preferred_source_dirs:
        - support
      path_terms:
        - operator
        - troubleshooting
    update_prereq:
      any_terms:
        - 업데이트
        - 업그레이드
        - update
        - upgrade
        - etcd
        - cluster api
        - cnf
        - pod
      preferred_categories:
        - upgrade
      preferred_source_dirs:
        - post_installation_configuration
      path_terms:
        - update
        - before-the-update
        - api
        - etcd
        - cnf
    certificate_maintenance:
      any_terms:
        - 인증서
        - certificate
        - cert
      preferred_categories:
        - troubleshooting
        - security
      preferred_source_dirs:
        - post_installation_configuration
        - support
      path_terms:
        - cert
        - certificate
        - maintenance

memory:
  follow_up_cues:
    - 그 전에
    - 그거
    - 거기
    - 이전
    - 위에서
    - 앞에서
    - 이어서
  max_active_source_dirs: 2
  carry_version_context: true
