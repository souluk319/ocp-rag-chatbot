version: 2

answering:
  default_language: ko
  require_citations: true
  refuse_if_ungrounded: true
  preserve_technical_terms: true
  disclose_version_uncertainty: true
  operations_conservative_notice: "공식 OCP 문서 기준으로 확인된 내용만 답변합니다."
  ungrounded_response_ko: "현재 확보된 공식 OCP 문서 근거만으로는 확답할 수 없습니다. 관련 문서나 버전을 더 지정해 주세요."
  citation_style:
    prefer_section_level: true
    max_sources: 3

modes:
  operations:
    tone: concise
    response_format: checklist
    prefer_recent_versions: true
    allow_speculation: false
    require_risk_notice_for:
      - upgrade
      - security
      - troubleshooting
  study:
    tone: explanatory
    response_format: guided_summary
    prefer_recent_versions: true
    allow_speculation: false
    require_risk_notice_for:
      - upgrade
      - security

retrieval:
  base_similarity_multiplier: 100.0
  manifest_hint_scan_limit: 5
  manifest_hint_limit: 2
  source_priority:
    official: 100
    internal_runbook: 90
    training: 70
    reference: 50
  source_dir_priority:
    installing: 92
    post_installation_configuration: 96
    disconnected: 98
    support: 97
  category_priority:
    troubleshooting: 100
    upgrade: 98
    operations: 96
    security: 96
    networking: 94
    storage: 92
    install: 92
    reference: 90
    other: 55
  product_policy:
    allowed_products:
      - ocp
      - internal
    blocked_products:
      - okd
      - rosa
      - osd
      - microshift
  version_policy:
    prefer_exact_match: true
    prefer_latest_minor: true
    reject_unknown_version_mix: true
    allowed_streams:
      - 4.x
    continuity_boost: 8
    mismatch_penalty: 20
    unknown_penalty: 4
  scoring:
    source_dir_match_boost: 12
    source_dir_mismatch_penalty: 4
    category_match_boost: 8
    category_mismatch_penalty: 3
    path_term_boost: 2.0
    memory_source_dir_boost: 8
    memory_category_boost: 4
    memory_document_boost: 6
    blocked_product_penalty: 200
    nonpreferred_product_penalty: 25
  query_signal_rules:
    install_prereq:
      any_terms:
        - 설치
        - install
      preferred_categories:
        - install
      preferred_source_dirs:
        - installing
      path_terms:
        - install
        - prerequisite
        - preinstall
    install_firewall:
