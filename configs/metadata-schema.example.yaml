version: 1

required_fields:
  - document_id
  - title
  - source_id
  - source_type
  - source_url
  - local_path
  - product
  - version
  - category
  - language
  - trust_level
  - collected_at
  - checksum

recommended_fields:
  - summary
  - tags
  - last_modified_at
  - release_stream
  - audience
  - visibility

field_notes:
  document_id: stable identifier for deduplication and reindexing
  title: normalized document title
  source_id: source name from the source manifest
  source_type: git_mirror, file_tree, export_bundle, or manual
  source_url: original retrieval URL when available
  local_path: current file path in the collection workspace
  product: ocp, okd, rosa, osd, or internal
  version: source document version, not chatbot version
  category: install, upgrade, networking, security, storage, troubleshooting, or other
  language: ko, en, or other ISO language code
  trust_level: official, internal_runbook, training, or reference
  collected_at: ISO-8601 collection timestamp
  checksum: content hash used for change detection
