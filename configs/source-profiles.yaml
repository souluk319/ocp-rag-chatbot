version: 1

mirrors:
  - id: openshift-docs
    type: git_mirror
    source_url: https://github.com/openshift/openshift-docs
    local_path: ../openshift-docs
    trust_level: official
    product: ocp
    language: en
    default_ref: main

profiles:
  - id: ocp-validation-main-p0
    mirror_id: openshift-docs
    source_id: openshift-docs-p0
    purpose: validation
    corpus_scope: p0
    git_ref: main
    version_label: 4.x
    include_dirs:
      - installing
      - post_installation_configuration
      - updating
      - disconnected
      - support
    exclude_dirs:
      - modules
      - snippets
      - _topic_maps
      - _images
      - _templates
      - _attributes
      - _stylesheets
      - _javascripts
      - _converters
      - _gemfiles
    exclude_prefixes:
      - osd_
      - rosa_
      - microshift_
      - cloud_experts_
    exclude_path_fragments:
      - /rosa-
      - /rosa_
      - -rosa-
      - _rosa_
      - /osd-
      - /osd_
      - -osd-
      - _osd_
      - /microshift-
      - /microshift_
      - -microshift-
      - _microshift_
      - /support/remote_health_monitoring/
      - /support/troubleshooting/rosa-
      - /support/troubleshooting/troubleshooting-osd-
      - /support/troubleshooting/sd-
    exclude_exact:
      - ocm
      - hosted_control_planes
      - lightspeed
      - migration_toolkit_for_containers
      - contributing_to_docs

  - id: ocp-target-minor-p0
    mirror_id: openshift-docs
    source_id_template: openshift-docs-{target_minor}-p0
    purpose: operator_release
    corpus_scope: p0
    git_ref_template: enterprise-{target_minor}
    version_label_template: "{target_minor}"
    target_minor_required: true
    include_dirs:
      - installing
      - post_installation_configuration
