version: 1

mirrors:
  - id: openshift-docs-4.20
    type: git_mirror
    source_url: https://github.com/openshift/openshift-docs
    local_path: ../openshift-docs-4.20
    trust_level: official
    product: ocp
    language: en
    default_ref: enterprise-4.20

profiles:
  - id: ocp-4.20-balanced
    mirror_id: openshift-docs-4.20
    source_id: openshift-docs-4.20-balanced
    purpose: canonical_evaluation
    corpus_scope: balanced_4_20
    git_ref: enterprise-4.20
    version_label: "4.20"
    include_dirs:
      - architecture
      - installing/overview
      - installing/install_config
      - installing/installing_platform_agnostic
      - installing/validation_and_troubleshooting
      - post_installation_configuration
      - updating
      - upgrading
      - disconnected
      - networking
      - security
      - storage
      - nodes
      - operators
      - observability
      - etcd
      - backup_and_restore
      - authentication
      - machine_configuration
      - machine_management
      - registry
      - support
    exclude_dirs:
      - snippets
      - _topic_maps
      - _images
      - _templates
      - _attributes
      - _stylesheets
      - _javascripts
      - _converters
      - _gemfiles
    exclude_prefixes:
      - osd_
      - rosa_
      - microshift_
      - cloud_experts_
    exclude_path_fragments:
      - /rosa-
      - /rosa_
      - -rosa-
      - _rosa_
      - /osd-
      - /osd_
      - -osd-
      - _osd_
      - /microshift-
      - /microshift_
      - -microshift-
      - _microshift_
      - /support/remote_health_monitoring/
      - /support/troubleshooting/rosa-
      - /support/troubleshooting/rosa-troubleshooting-
      - /support/troubleshooting/troubleshooting-osd-
      - /support/troubleshooting/sd-
      - /authentication/osd-
      - /authentication/sd-
      - /architecture/ocm-
      - /architecture/mce-
      - /architecture/osd-
      - /architecture/rosa-
      - /architecture/cicd_
      - /architecture/nvidia-gpu-
      - /networking/ovn_kubernetes_network_provider/migrate-from-openshift-sdn-osd
      - /openshift-sdn-osd
    exclude_exact:
      - ocm
      - hosted_control_planes
      - lightspeed
      - migration_toolkit_for_containers
      - contributing_to_docs
      - release_notes
      - rest_api
      - web_console
      - applications
      - cicd
