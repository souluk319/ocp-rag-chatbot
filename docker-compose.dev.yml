services:
  frontend:
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_PROXY_TARGET: http://backend:8765
    command:
      - sh
      - -lc
      - npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    volumes:
      - ./presentation-ui:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
