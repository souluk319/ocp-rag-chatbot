version: 3
product: play-book-studio
scorecard_role: product_release_gate
product_status: award_winning_enterprise_product
current_stage: renewal_hardening_validation
operating_mode: renewal_not_reinvention
current_scope: openshift_4_20_source_first_validated_pack_plus_ocp_operator_order_delivery_plus_release_packet_support
current_order: ocp_operator_playbook_package_for_ocp_operators
north_star: technical_wiki_runtime_that_guides_operation_and_learning
promotion_gate:
  full_sale_requires:
    - critical_scenario_pass_rate >= 0.90
    - evidence_linked_answer_rate >= 0.95
    - unsupported_assertion_rate == 0
    - clarification_miss_count == 0
    - demo_hard_miss_count == 0
    - persisted_session == true
    - audit_trail == true
    - customer_document_reference_case_count >= 1
release_blockers:
  - hard_miss_on_product_gate
  - unsupported_assertion
  - clarification_required_but_answered
  - unreviewed_asset_exposed
  - source_trace_missing
  - text_only_runtime_for_figure_heavy_docs
  - pack_boundary_blur
scenario_set:
  - id: product-001
    question: 질문에 제대로 응답하나?
    expected:
      - grounded answer 또는 honest no-answer 전환이 있어야 한다
      - 현재 범위와 한계를 숨기지 않는다
    pass_if:
      - response_ready_or_honest_no_answer
      - current_scope_is_honest
  - id: product-002
    question: 연결된 위키 경험이 보이나?
    expected:
      - book entity section figure chat overlay 가 한 제품 안에 보인다
    pass_if:
      - runtime_feels_like_connected_wiki
      - not_just_static_document_viewer
  - id: product-003
    question: 이 답이 어디서 왔나?
    expected:
      - citation 과 source trace 와 viewer jump 를 보여준다
    pass_if:
      - source_trace_is_clickable
      - version_and_anchor_are_visible
  - id: product-004
    question: 고객 문서 경계가 보존되나?
    expected:
      - customer pack 과 review gate 를 분리해서 설명한다
    pass_if:
      - boundary_is_explicit
      - no_any_document_overclaim
  - id: product-005
    question: 다음 행동으로 이어지나?
    expected:
      - next play, related docs, related sections, overlay signals 를 보여준다
    pass_if:
      - runtime_supports_real_navigation
      - personalization_is_visible
notes:
  - 이 문서는 product gate 와 release gate 를 함께 고정한다
  - buyer/demo/release packet surface 는 inspection path 중 하나이지 core quality gate 는 아니다
  - renewal 기간의 현재 task 는 product reinvention 이 아니라 operator order delivery readiness 다
