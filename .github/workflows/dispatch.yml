name: OCP RAG Pipeline

on:
  workflow_dispatch:
    inputs:
      task:
        description: "실행할 작업"
        required: true
        type: choice
        options:
          - test-all
          - test-part1
          - test-part2
          - test-part3
          - test-part4
          - run-part1
          - run-part1-validate
          - run-part2-smoke
          - run-part2-benchmark
          - run-part2-eval
          - run-part3-eval
          - audit-part1
      part1_subset:
        description: "Part 1 처리 범위 (run-part1 전용)"
        required: false
        type: choice
        default: "high-value"
        options:
          - high-value
          - all
      skip_embeddings:
        description: "임베딩 건너뛰기 (run-part1 전용)"
        required: false
        type: boolean
        default: false
      skip_qdrant:
        description: "Qdrant 건너뛰기 (run-part1 전용)"
        required: false
        type: boolean
        default: false

env:
  EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
  EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
  EMBEDDING_BATCH_SIZE: "32"
  QDRANT_URL: ${{ secrets.QDRANT_URL }}
  QDRANT_COLLECTION: openshift_docs
  QDRANT_VECTOR_SIZE: "1024"
  QDRANT_DISTANCE: Cosine
  QDRANT_UPSERT_BATCH_SIZE: "128"
  LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      # ---------- tests ----------
      - name: Run all tests
        if: inputs.task == 'test-all'
        run: python -m pytest tests/ -v

      - name: Test Part 1
        if: inputs.task == 'test-part1'
        run: python -m pytest tests/test_part1_*.py -v

      - name: Test Part 2
        if: inputs.task == 'test-part2'
        run: python -m pytest tests/test_part2_*.py -v

      - name: Test Part 3
        if: inputs.task == 'test-part3'
        run: python -m pytest tests/test_part3_*.py -v

      - name: Test Part 4
        if: inputs.task == 'test-part4'
        run: python -m pytest tests/test_part4_*.py -v

      # ---------- pipeline runs ----------
      - name: Run Part 1 pipeline
        if: inputs.task == 'run-part1'
        run: |
          FLAGS="--process-subset ${{ inputs.part1_subset }}"
          if [ "${{ inputs.skip_embeddings }}" = "true" ]; then FLAGS="$FLAGS --skip-embeddings"; fi
          if [ "${{ inputs.skip_qdrant }}" = "true" ]; then FLAGS="$FLAGS --skip-qdrant"; fi
          python scripts/run_part1.py $FLAGS

      - name: Validate Part 1 outputs
        if: inputs.task == 'run-part1-validate'
        run: python scripts/validate_part1_outputs.py --skip-qdrant-id-check

      - name: Run Part 2 smoke
        if: inputs.task == 'run-part2-smoke'
        run: python scripts/run_part2_smoke.py

      - name: Run Part 2 benchmark
        if: inputs.task == 'run-part2-benchmark'
        run: python scripts/run_part2_benchmark.py

      - name: Run Part 2 eval
        if: inputs.task == 'run-part2-eval'
        run: python scripts/run_part2_eval.py

      - name: Run Part 3 eval
        if: inputs.task == 'run-part3-eval'
        run: python scripts/run_part3_eval.py

      - name: Audit Part 1 data quality
        if: inputs.task == 'audit-part1'
        run: python scripts/audit_part1_data_quality.py

      # ---------- upload artifacts ----------
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ inputs.task }}-${{ github.run_number }}
          path: |
            artifacts/
            **/validation_report.json
            **/smoke_report.json
            **/benchmark_report.json
            **/eval_report.json
          if-no-files-found: ignore
          retention-days: 14
