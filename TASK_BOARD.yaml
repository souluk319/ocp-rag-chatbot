board_version: 3
product: play-book-studio
product_mode: technical_wiki_platform
north_star: source_first_figure_aware_wiki_runtime
current_stage: paid_poc_candidate
validated_pack:
  product: openshift_container_platform
  version: '4.20'
  locale: ko
principles:
- archive_before_goal_reset
- source_first_before_fallback
- structured_book_over_markdown
- wiki_runtime_over_static_viewer
- figure_and_relation_as_first_class_assets
- overlay_is_personalization_not_body_edit
- harness_first_execution
- local_worklog_buffering
- worktree_isolated_lanes
- parallel_explore_build_review
owners:
  product_architect:
    role: contract_reset_product_surface
  knowledge_engineer:
    role: source_parse_runtime_materialization
  platform_engineer:
    role: viewer_chat_control_tower_runtime
  judge:
    role: release_gate_and_evidence
phases:
- id: R0
  name: active_rule_reset
  goal: 새 위키대백과 기준선으로 active rule set 을 재작성한다.
  epics:
  - id: R0-E1
    name: contract_rewrite
    tasks:
    - id: R0-E1-T1
      title: 기존 active rule set 을 날짜 기준 archive backup 한다
      owner: product_architect
      status: done
      outputs:
      - archive/root_contracts/2026-04-14_active_rule_reset_backup
      tests:
      - archived_active_docs_exist
    - id: R0-E1-T2
      title: active rule set 전체를 technical wiki 기준으로 다시 작성한다
      owner: product_architect
      status: done
      outputs:
      - AGENTS.md
      - PROJECT.md
      - CODEX_OPERATING_CHARTER.md
      - Q1_8_PRODUCT_CONTRACT.md
      - OWNER_SCENARIO_SCORECARD.yaml
      - P0_ARCHITECTURE_FREEZE_ADDENDUM.md
      - PARSED_ARTIFACT_CONTRACT.md
      - SECURITY_BOUNDARY_CONTRACT.md
      - TASK_BOARD.yaml
      tests:
      - active_rule_docs_match_technical_wiki_charter
- id: H1
  name: execution_harness
  goal: lane 별 하네스로 preflight, worklog, final evidence 를 고정하고 closeout packet 으로만
    보고한다.
  epics:
  - id: H1-E1
    name: harness_contract_and_bootstrap
    tasks:
    - id: H1-E1-T1
      title: execution harness contract 를 active rule set 에 추가한다
      owner: product_architect
      status: done
      outputs:
      - EXECUTION_HARNESS_CONTRACT.md
      - AGENTS.md
      - CODEX_OPERATING_CHARTER.md
      - PROJECT.md
      tests:
      - active_rule_docs_reference_execution_harness
    - id: H1-E1-T2
      title: milestone preflight 와 local worklog bootstrap 스크립트를 추가한다
      owner: platform_engineer
      status: done
      outputs:
      - scripts/prepare_execution_harness.py
      - reports/execution_harness
      tests:
      - execution_harness_bootstrap_creates_manifest_worklog_and_final_report
  - id: H1-E2
    name: parallel_lane_execution
    tasks:
    - id: H1-E2-T1
      title: execution harness 는 lane_id 와 role 을 포함한 manifest 를 생성한다
      owner: platform_engineer
      status: done
      outputs:
      - scripts/prepare_execution_harness.py
      - reports/execution_harness
      tests:
      - harness_manifest_supports_parallel_lanes
- id: W1
  name: source_first_wiki_runtime
  goal: source-first full rebuild 이 technical wiki runtime 으로 재현 가능해야 한다.
  epics:
  - id: W1-E1
    name: one_click_runtime
    tasks:
    - id: W1-E1-T1
      title: one-click runtime rebuild path 를 유지한다
      owner: knowledge_engineer
      status: done
      outputs:
      - scripts/run_ocp420_one_click_runtime.py
      - reports/build_logs/ocp420_one_click_runtime_report.json
      tests:
      - one_click_runtime_report_status_ok
    - id: W1-E1-T2
      title: active runtime 은 29권 기준 source-first 위키 런타임을 유지한다
      owner: platform_engineer
      status: done
      outputs:
      - data/wiki_runtime_books/active_manifest.json
      tests:
      - active_runtime_count_is_29
  - id: W1-E2
    name: relation_runtime
    tasks:
    - id: W1-E2-T1
      title: entity section figure relation graph 를 active runtime 기준으로 유지한다
      owner: knowledge_engineer
      status: done
      outputs:
      - data/wiki_relations
      - reports/build_logs/full_rebuild_wiki_relations_report.json
      tests:
      - relation_reports_have_book_and_entity_counts
- id: W2
  name: technical_wiki_quality
  goal: 위키 본문, 탐색, 그림, 개인화가 서로 계층을 침범하지 않게 정리한다.
  epics:
  - id: W2-E1
    name: viewer_information_architecture
    tasks:
    - id: W2-E1-T1
      title: 본문에서 과도한 overlay 를 제거하고 읽기 중심 viewer 로 정리한다
      owner: platform_engineer
      status: done
      outputs:
      - src/play_book_studio/app/viewer_page.py
      - src/play_book_studio/app/viewer_blocks.py
      - reports/build_logs/viewer_cleanup_report.json
      - reports/build_logs/viewer_cleanup_live_report.json
      tests:
      - live_viewer_has_no_section_or_figure_overlay_toolbar
    - id: W2-E1-T2
      title: 위키 탐색 패널 정보 구조를 다시 설계한다
      owner: platform_engineer
      status: done
      outputs:
      - src/play_book_studio/app
      - presentation-ui
      - reports/build_logs
      tests:
      - runtime_viewer_navigation_hierarchy_is_reduced_and_clear
  - id: W2-E2
    name: figure_and_diagram_runtime
    tasks:
    - id: W2-E2-T1
      title: figure-aware runtime 과 figure relation 을 유지한다
      owner: knowledge_engineer
      status: done
      outputs:
      - data/wiki_relations/figure_assets.json
      - data/wiki_relations/figure_entity_index.json
      - data/wiki_relations/figure_section_index.json
      tests:
      - figure_assets_are_reachable_from_runtime_and_hubs
    - id: W2-E2-T2
      title: diagram block 계약과 실제 coverage 를 추가한다
      owner: knowledge_engineer
      status: done
      outputs:
      - archive/root_contracts
      - scripts
      - data
      - reports/build_logs
      tests:
      - diagram_blocks_exist_for_supported_sources
- id: W3
  name: personalization_and_signals
  goal: 개인화 overlay 를 위키 탐색과 backlog 신호로만 사용하고 본문을 더럽히지 않는다.
  epics:
  - id: W3-E1
    name: overlay_runtime
    tasks:
    - id: W3-E1-T1
      title: overlay storage and signal path 를 유지한다
      owner: platform_engineer
      status: done
      outputs:
      - src/play_book_studio/app/wiki_user_overlay.py
      - reports/build_logs/wiki_user_overlay_storage_report.json
      - reports/build_logs/wiki_overlay_usage_signals_report.json
      tests:
      - overlay_signals_feed_control_tower_and_next_plays
    - id: W3-E1-T2
      title: overlay signal 을 챗봇 랭킹과 관련 탐색에 반영한다
      owner: platform_engineer
      status: done
      outputs:
      - reports/build_logs/overlay_chat_ranking_report.json
      tests:
      - overlay_preference_can_change_chat_ranking
