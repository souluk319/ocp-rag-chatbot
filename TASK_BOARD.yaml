board_version: 3
product: play-book-studio
product_mode: technical_wiki_platform
north_star: source_first_figure_aware_wiki_runtime
current_stage: paid_poc_candidate
validated_pack:
  product: openshift_container_platform
  version: '4.20'
  locale: ko
principles:
- archive_before_goal_reset
- source_first_before_fallback
- structured_book_over_markdown
- wiki_runtime_over_static_viewer
- figure_and_relation_as_first_class_assets
- overlay_is_personalization_not_body_edit
- harness_first_execution
- local_worklog_buffering
- worktree_isolated_lanes
- parallel_explore_build_review
owners:
  product_architect:
    role: contract_reset_product_surface
  knowledge_engineer:
    role: source_parse_runtime_materialization
  platform_engineer:
    role: viewer_chat_control_tower_runtime
  judge:
    role: release_gate_and_evidence
phases:
- id: R0
  name: active_rule_reset
  goal: 새 위키대백과 기준선으로 active rule set 을 재작성한다.
  epics:
  - id: R0-E1
    name: contract_rewrite
    tasks:
    - id: R0-E1-T1
      title: 기존 active rule set 을 날짜 기준 archive backup 한다
      owner: product_architect
      status: done
      outputs:
      - archive/root_contracts/2026-04-14_active_rule_reset_backup
      tests:
      - archived_active_docs_exist
    - id: R0-E1-T2
      title: active rule set 전체를 technical wiki 기준으로 다시 작성한다
      owner: product_architect
      status: done
      outputs:
      - AGENTS.md
      - PROJECT.md
      - CODEX_OPERATING_CHARTER.md
      - Q1_8_PRODUCT_CONTRACT.md
      - OWNER_SCENARIO_SCORECARD.yaml
      - P0_ARCHITECTURE_FREEZE_ADDENDUM.md
      - PARSED_ARTIFACT_CONTRACT.md
      - SECURITY_BOUNDARY_CONTRACT.md
      - TASK_BOARD.yaml
      tests:
      - active_rule_docs_match_technical_wiki_charter
- id: H1
  name: execution_harness
  goal: lane 별 하네스로 preflight, worklog, final evidence 를 고정하고 closeout packet 으로만
    보고한다.
  epics:
  - id: H1-E1
    name: harness_contract_and_bootstrap
    tasks:
    - id: H1-E1-T1
      title: execution harness contract 를 active rule set 에 추가한다
      owner: product_architect
      status: done
      outputs:
      - EXECUTION_HARNESS_CONTRACT.md
      - AGENTS.md
      - CODEX_OPERATING_CHARTER.md
      - PROJECT.md
      tests:
      - active_rule_docs_reference_execution_harness
    - id: H1-E1-T2
      title: milestone preflight 와 local worklog bootstrap 스크립트를 추가한다
      owner: platform_engineer
      status: done
      outputs:
      - scripts/prepare_execution_harness.py
      - reports/execution_harness
      tests:
      - execution_harness_bootstrap_creates_manifest_worklog_and_final_report
  - id: H1-E2
    name: parallel_lane_execution
    tasks:
    - id: H1-E2-T1
      title: execution harness 는 lane_id 와 role 을 포함한 manifest 를 생성한다
      owner: platform_engineer
      status: done
      outputs:
      - scripts/prepare_execution_harness.py
      - reports/execution_harness
      tests:
      - harness_manifest_supports_parallel_lanes
- id: W1
  name: source_first_wiki_runtime
  goal: source-first full rebuild 이 technical wiki runtime 으로 재현 가능해야 한다.
  epics:
  - id: W1-E1
    name: one_click_runtime
    tasks:
    - id: W1-E1-T1
      title: one-click runtime rebuild path 를 유지한다
      owner: knowledge_engineer
      status: done
      outputs:
      - scripts/run_ocp420_one_click_runtime.py
      - reports/build_logs/ocp420_one_click_runtime_report.json
      tests:
      - one_click_runtime_report_status_ok
    - id: W1-E1-T2
      title: active runtime 은 29권 기준 source-first 위키 런타임을 유지한다
      owner: platform_engineer
      status: done
      outputs:
      - data/wiki_runtime_books/active_manifest.json
      tests:
      - active_runtime_count_is_29
    - id: W1-E1-T3
      title: full pipeline rerun 과 runtime retrieval mixed smoke 를 active 기준으로 다시 검증한다
      owner: judge
      status: done
      outputs:
      - reports/build_logs/ocp420_one_click_runtime_report.json
      - reports/build_logs/full_pipeline_verification_report.json
      - reports/build_logs/runtime_readiness_report.json
      - reports/build_logs/retrieval_eval_report.json
      - reports/build_logs/mixed_runtime_end_to_end_report.json
      - reports/build_logs/chat_navigation_backlog_report.json
      tests:
      - one_click_runtime_report_status_ok
      - retrieval_eval_hit_at_5_is_1_0
      - mixed_runtime_end_to_end_report_status_ok
      - navigation_backlog_excludes_legacy_wave1_links
    - id: W1-E1-T4
      title: wave1 processed archive 를 active 파이프라인에서 분리하고 full_rebuild only rebuild path 로 고정한다
      owner: product_architect
      status: done
      outputs:
      - archive/reset_snapshots/2026-04-15_w6_archive_reset
      - scripts/run_ocp420_full_rebuild.py
      - scripts/materialize_ocp420_full_rebuild_books.py
      - src/play_book_studio/app/source_books.py
      - src/play_book_studio/app/data_control_room.py
      - reports/build_logs/archive_reset_report.json
      - reports/build_logs/archive_reset_verification_report.json
      tests:
      - archive_reset_moves_wave1_processed_assets_out_of_active_paths
      - full_rebuild_materialization_no_longer_depends_on_wave1_manifest
      - one_click_runtime_report_status_ok_after_archive_reset
    - id: W1-E1-T5
      title: 최신 full_rebuild active runtime 만 서비스 표면에 노출하고 legacy candidate/archive viewer 는 차단한다
      owner: platform_engineer
      status: done
      outputs:
      - src/play_book_studio/app/server.py
      - src/play_book_studio/app/source_books.py
      - src/play_book_studio/app/data_control_room.py
      - presentation-ui/src/pages/PlaybookLibraryPage.tsx
      - reports/build_logs/latest_only_surface_gate_report.json
      - reports/build_logs/latest_only_surface_gate_verification_report.json
      tests:
      - legacy_candidate_and_wave1_viewer_paths_return_not_found
      - control_room_latest_only_surface_hides_gold_candidate_books
      - presentation_ui_build_passes_after_latest_only_surface_gate
    - id: W1-E1-T6
      title: old processed output 을 archive snapshot 으로 이동한 뒤 runtime catalog library 와 final one-click rebuild 를 다시 실행한다
      owner: knowledge_engineer
      status: done
      outputs:
      - archive/reset_snapshots/2026-04-15_w6_final_only_rebuild_reset
      - reports/build_logs/runtime_catalog_library_report.json
      - reports/build_logs/final_only_rebuild_reset_report.json
      - reports/build_logs/final_only_rebuild_reset_verification_report.json
      - reports/build_logs/ocp420_one_click_runtime_report.json
      - data/wiki_runtime_books/active_manifest.json
      tests:
      - runtime_catalog_library_report_exists_after_processed_output_reset
      - one_click_runtime_report_status_ok_after_final_only_rebuild_reset
      - active_runtime_count_is_29_after_final_only_rebuild_reset
  - id: W1-E2
    name: relation_runtime
    tasks:
    - id: W1-E2-T1
