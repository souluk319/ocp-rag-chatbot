version: 1

scenario:
  required_fields:
    - scenario_id
    - title
    - turns
  turn_minimum: 5

turn:
  required_fields:
    - turn_index
    - question_ko
    - expected_classification
    - expected_source_dir
    - expected_topic
    - expected_version
    - required_rewrite_terms
  optional_fields:
    - expected_document_path
    - forbidden_rewrite_terms
    - notes

report:
  required_fields:
    - summary
    - scenarios
  summary_metrics:
    - scenario_count
    - turn_count
    - rewrite_term_pass_rate
    - source_dir_pass_rate
    - version_pass_rate
    - fully_passing_scenarios
