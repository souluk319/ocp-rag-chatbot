version: 1

case_record_type: retrieval_benchmark_case
result_record_type: retrieval_benchmark_result

case_required_fields:
  - id
  - scenario_id
  - turn_index
  - turn_type
  - group
  - question_ko
  - expected_source_dirs
  - expected_document_paths
  - expected_category
  - expected_version_behavior
  - expected_query_class
  - expected_memory_behavior
  - citation_required
  - click_through_required
  - context_harness_required
  - notes

case_field_notes:
  id: stable benchmark case identifier
  scenario_id: scenario grouping for standalone and follow-up turns
  turn_index: turn order inside the scenario
  turn_type: standalone or follow_up
  group: high-level scenario group from evaluation-spec
  question_ko: Korean operator-facing query
  expected_source_dirs: source directories that should appear in retrieval results
  expected_document_paths: relative openshift-docs paths that count as supporting documents
  expected_category: install, upgrade, troubleshooting, or other
  expected_version_behavior: stable, explicit_change, or uncertain_disclose
  expected_query_class: retrieval benchmark query class
  expected_memory_behavior: standalone, preserve_context, or follow_up_rewrite_required
  citation_required: whether grounded answers must cite this case
  click_through_required: whether citations must resolve to a viewer path
  context_harness_required: whether the case should be traceable through Stage 4.5 artifacts
  must_include_terms: optional expected answer terms
  must_not_include_terms: optional forbidden answer terms
  notes: why the case belongs in the benchmark

result_required_fields:
  - benchmark_case_id
  - retrieval_candidates
  - reranked_candidates
  - citations

result_field_notes:
  benchmark_case_id: link to a benchmark case id
  retrieval_candidates: ranked retrieval results before reranking
  reranked_candidates: ranked retrieval results after reranking
  citations: final citations emitted for the grounded answer
  grounded_answer: optional boolean describing whether the system claimed grounded support
  click_through_ok: optional boolean that confirms the cited viewer path opened correctly
  context_trace_ref: optional reference to a Stage 4.5 trace artifact

candidate_shape:
  required:
    - rank
    - source_dir
    - document_path
  recommended:
    - document_id
    - section_id
    - viewer_url
    - score
    - section_title

citation_shape:
  required:
    - document_path
    - viewer_url
  recommended:
    - section_id
    - section_title
    - chunk_id

metrics:
  - source_dir_hit@3
  - source_dir_hit@5
  - supporting_doc_hit@5
  - supporting_doc_hit@10
  - citation_correctness
  - retrieval_supporting_doc_hit@5
  - reranked_supporting_doc_hit@5
  - rerank_lift@5
