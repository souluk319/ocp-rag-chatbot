<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCP Operations Assistant v2</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --panel: #fffdf8;
      --ink: #1e2a22;
      --muted: #5f6d61;
      --line: #d9d1c4;
      --accent: #0d6b4d;
      --accent-soft: #e2f2ec;
      --user: #eef3ff;
      --assistant: #f7f8f4;
      --danger: #8f2d2d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, #fff7df 0%, transparent 35%),
        radial-gradient(circle at bottom right, #d9efe4 0%, transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(48, 57, 44, 0.08);
    }

    .sidebar {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .status {
      padding: 14px;
      border-radius: 14px;
      background: var(--accent-soft);
      border: 1px solid #c6e6d8;
      font-size: 14px;
      line-height: 1.5;
    }

    .status strong { color: var(--accent); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    select, textarea, button {
      font: inherit;
    }

    select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      padding: 12px 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5;
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .toolbar .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .chatlog {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 55vh;
      max-height: 65vh;
      overflow: auto;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: var(--user);
      align-self: flex-end;
      max-width: 80%;
    }

    .bubble.assistant {
      background: var(--assistant);
      align-self: stretch;
    }

    .bubble .role {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .sources {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--line);
      display: grid;
      gap: 10px;
    }

    .source {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .source a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .source .path {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      word-break: break-all;
    }

    .footer {
      border-top: 1px solid var(--line);
      padding: 18px 22px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: #ebe7de;
      color: var(--ink);
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .runtime-note {
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .chatlog {
        min-height: 48vh;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel sidebar">
      <div class="brand">
        <div class="eyebrow">OCP RAG v2</div>
        <h1>OCP 운영도우미</h1>
        <p class="sub">한국어로 질문하고, 근거 문서를 바로 열어보는 폐쇄망용 운영 가이드 챗봇입니다.</p>
      </div>

      <div id="statusBox" class="status">
        <strong>상태 확인 중</strong><br />
        런타임 health 를 조회하고 있습니다.
      </div>

      <div class="field">
        <label for="mode">응답 모드</label>
        <select id="mode">
          <option value="operations">operations</option>
          <option value="study">study</option>
        </select>
      </div>

      <div class="field">
        <label for="question">질문</label>
        <textarea id="question" placeholder="예: OpenShift CNF 클러스터 업데이트 전에 무엇을 준비해야 하나요?"></textarea>
      </div>

      <ul class="tips">
        <li>답변 하단 citation 을 누르면 HTML 문서가 열립니다.</li>
        <li>같은 세션에서 후속 질문을 하면 이전 문맥을 이어갑니다.</li>
        <li>질문은 한국어로 해도 됩니다.</li>
      </ul>
    </aside>

    <main class="panel main">
      <div class="toolbar">
        <div>
          <h2>채팅</h2>
          <div class="meta">주소는 이 페이지 그대로 `localhost:8000` 입니다.</div>
        </div>
        <div class="meta" id="sessionMeta">세션 없음</div>
      </div>

      <div class="chatlog" id="chatlog"></div>

      <div class="footer">
        <div class="actions">
          <button id="sendBtn">질문 보내기</button>
          <button id="clearBtn" class="secondary">대화 지우기</button>
        </div>
        <div class="runtime-note" id="runtimeNote">대기 중</div>
      </div>
    </main>
  </div>

  <script>
    const chatlog = document.getElementById("chatlog");
    const questionInput = document.getElementById("question");
    const modeSelect = document.getElementById("mode");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const runtimeNote = document.getElementById("runtimeNote");
    const statusBox = document.getElementById("statusBox");
    const sessionMeta = document.getElementById("sessionMeta");

    let activeConversationId = "";

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function addBubble(role, text) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.innerHTML = `<div class="role">${role === "user" ? "user" : "assistant"}</div><div class="body">${escapeHtml(text)}</div>`;
      chatlog.appendChild(bubble);
      chatlog.scrollTop = chatlog.scrollHeight;
      return bubble;
    }

    function renderSources(container, sources) {
      if (!sources || !sources.length) return;
      const wrapper = document.createElement("div");
      wrapper.className = "sources";

      sources.forEach((source, index) => {
        const viewerUrl = source.viewer_url || "#";
        const title = source.title || source.section_title || `Source ${index + 1}`;
        const path = source.document_path || "";
        const section = source.section_title || "";
        const item = document.createElement("div");
        item.className = "source";
        item.innerHTML =
          `<a href="${viewerUrl}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>` +
          (section ? `<div>${escapeHtml(section)}</div>` : "") +
          (path ? `<div class="path">${escapeHtml(path)}</div>` : "");
        wrapper.appendChild(item);
      });

      container.appendChild(wrapper);
      chatlog.scrollTop = chatlog.scrollHeight;
    }

    async function loadHealth() {
      try {
        const response = await fetch("/health");
        const payload = await response.json();
        if (!payload.ok) {
          statusBox.innerHTML = `<strong>설정 미완료</strong><br />${escapeHtml(JSON.stringify(payload.missing_gateway_keys || []))}`;
          statusBox.classList.add("error");
          return;
        }
        statusBox.innerHTML =
          `<strong>실행 중</strong><br />index: ${escapeHtml(payload.active_index_id || "-")}<br />문서 수: ${escapeHtml(String(payload.active_document_count || 0))}`;
      } catch (error) {
        statusBox.innerHTML = `<strong>접속 실패</strong><br />${escapeHtml(String(error))}`;
        statusBox.classList.add("error");
      }
    }

    async function streamChat() {
      const query = questionInput.value.trim();
      if (!query) return;

      sendBtn.disabled = true;
      runtimeNote.textContent = "질문 전송 중";

      addBubble("user", query);
      const assistantBubble = addBubble("assistant", "");
      const body = assistantBubble.querySelector(".body");
      let renderedText = "";
      let sources = [];

      try {
        const response = await fetch("/api/v1/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            query,
            mode: modeSelect.value,
            conversationId: activeConversationId || undefined
          })
        });

        if (!response.ok || !response.body) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        function processEventBlock(block) {
          const lines = block.split("\n");
          let event = "message";
          const dataLines = [];
          for (const line of lines) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
          }
          const raw = dataLines.join("\n");
          if (!raw) return;
          let payload;
          try {
            payload = JSON.parse(raw);
          } catch {
            payload = raw;
          }

          if (event === "sources") {
            sources = Array.isArray(payload) ? payload : [];
            return;
          }
          if (event === "chunk") {
            renderedText += String(payload);
            body.textContent = renderedText;
            chatlog.scrollTop = chatlog.scrollHeight;
            return;
          }
          if (event === "done" && payload && typeof payload === "object") {
            activeConversationId = payload.conversationId || activeConversationId;
            sessionMeta.textContent = activeConversationId ? `세션 ${activeConversationId.slice(0, 8)}...` : "세션 없음";
            renderSources(assistantBubble, sources);
            runtimeNote.textContent = "응답 완료";
          }
        }

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let separatorIndex;
          while ((separatorIndex = buffer.indexOf("\n\n")) >= 0) {
            const block = buffer.slice(0, separatorIndex).trim();
            buffer = buffer.slice(separatorIndex + 2);
            if (block) processEventBlock(block);
          }
        }

        if (!renderedText.trim()) {
          body.textContent = "응답이 비어 있습니다.";
        }
      } catch (error) {
        body.textContent = `오류: ${String(error)}`;
        assistantBubble.classList.add("error");
        runtimeNote.textContent = "오류 발생";
      } finally {
        questionInput.value = "";
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", streamChat);
    clearBtn.addEventListener("click", () => {
      chatlog.innerHTML = "";
      runtimeNote.textContent = "대화가 초기화되었습니다";
      activeConversationId = "";
      sessionMeta.textContent = "세션 없음";
    });
    questionInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        streamChat();
      }
    });

    loadHealth();
  </script>
</body>
</html>
