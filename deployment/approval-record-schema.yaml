version: 1

approval_record:
  required:
    - bundle_id
    - status
    - reviewer
    - reviewed_at
    - source_scope_verified
    - removal_impact_checked
    - checksum_verified
    - approved_for_import

allowed_status:
  - pending
  - approved
  - rejected

optional_fields:
  - notes
  - smoke_query_report
  - removal_impact_summary
  - evidence_links
