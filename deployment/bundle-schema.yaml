version: 1

bundle:
  required:
    - bundle_id
    - created_at
    - source_manifest_version
    - baseline_manifest_id
    - approval
    - files
    - summary

approval:
  required:
    - status
    - reviewer
    - reviewed_at

summary:
  required:
    - added
    - changed
    - removed

files:
  item_required:
    - document_id
    - relative_path
    - checksum
    - action
    - source_id
    - category
    - version

allowed_actions:
  - added
  - changed
  - removed
