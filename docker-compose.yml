services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      QDRANT_URL: http://qdrant:6333
      GRAPH_URI: bolt://host.docker.internal:7687
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"
    volumes:
      - ./src:/app/src
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./manifests:/app/manifests
      - ./reports:/app/reports
      - ./tmp:/app/tmp
      - ./tmp_source:/app/tmp_source
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./presentation-ui
      dockerfile: Dockerfile
    environment:
      VITE_PROXY_TARGET: http://backend:8765
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./presentation-ui/src:/app/src
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  qdrant_storage:
