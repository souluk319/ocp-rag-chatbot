services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # 벡터 인덱스 + 코퍼스 영속화
      - ./data:/app/data
      # HuggingFace 모델 캐시 — 재시작해도 재다운로드 안 함
      - hf-cache:/app/.cache/huggingface
      # .env 마운트 (읽기 전용)
      - ./.env:/app/.env:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 메모리 제한 (필요 시 조정)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4g

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    # 60초 안에 키 변경이 1개 이상이면 RDB 스냅샷 저장
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:   # Redis RDB 스냅샷
  hf-cache:     # HuggingFace 모델 가중치
