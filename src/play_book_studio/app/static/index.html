<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Play Book Studio</title>
  <link rel="stylesheet" href="/assets/app-shell.css">
</head>

<body>
  <div class="shell">
    
    
    <header class="topbar card">
      <div class="topbar-main">
        <div class="brand-lockup">
          <img class="brand-mark" src="/assets/red-hat-hat.png" alt="Red Hat style hat mark">
          <span class="brand-divider" aria-hidden="true"></span>
          <div class="brand-copy">
            <div class="eyebrow">Play Book Studio</div>
            <div class="headline-row">
              <h1>OCP Book Studio</h1>
              <span class="version-chip" id="version-chip">Pack · OpenShift 4.20</span>
            </div>
          </div>
        </div>
        <p>OpenShift v4.20 DEMO</p>
      </div>
      <div class="topbar-side" style="display: flex; flex-direction: row; align-items: center; gap: 8px; background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0;">
        <style>
          .topbar { padding: 8px 20px !important; min-height: 52px !important; display: flex !important; align-items: center !important; justify-content: space-between !important; }
          .topbar-main { padding: 0 !important; background: none !important; }
          .topbar-main::before, .topbar-main::after { display: none !important; }
          .brand-lockup { margin: 0 !important; }
          .headline-row h1 { font-size: 20px !important; margin: 0 !important; }
          .eyebrow { margin-bottom: 2px !important; font-size: 10px !important; }
          .topbar p { display: none !important; } /* Hide the redundant 'OpenShift v4.20 DEMO' under logo to save height */
          .version-chip { display: none !important; }
          .topbar-side .pill { background: rgba(255,255,255,0.08) !important; border-color: transparent !important; font-size: 12px !important; padding: 4px 10px !important; min-height: 0 !important; }
          .topbar-side .status-pill { padding-left: 24px !important; }
          .topbar-side button { font-size: 12px !important; padding: 4px 12px !important; min-height: 0 !important; border-radius: 6px !important; background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.9) !important; cursor: pointer; }
          .topbar-side button:hover { background: rgba(255,255,255,0.15) !important; }
        </style>
        <div class="pill status-pill">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">준비됨</span>
        </div>
        <div class="pill">대화 <span id="session-id">-</span></div>
        <div style="width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 4px;"></div>
        <button type="button" id="reset-btn">초기화</button>
        <button type="button" id="new-session-btn">새 대화</button>
      </div>
    </header>

    <section class="workspace">
      <aside class="card left-rail">
        <div class="left-rail-header" style="justify-content: space-between; display: flex; align-items: center; width: 100%;">
          <div class="left-rail-title" style="flex: 1; display: flex; gap: 8px;">
            <div class="trace-tabs left-trace-tabs" style="display: flex; gap: 4px; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 8px;">
              <button type="button" class="trace-tab-left active" data-target="library" style="border: none; background: white; padding: 4px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: all 0.2s;">자료</button>
              <button type="button" class="trace-tab-left" data-target="friendly_trace" style="border: none; background: transparent; padding: 4px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.2s;">상황실</button>
            </div>
          </div>
          <button type="button" class="panel-icon-btn" id="left-rail-toggle-btn" aria-label="왼쪽 패널 닫기"
            title="왼쪽 패널 닫기"><svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M10 3.5 5.5 8 10 12.5"></path>
            </svg></button>
        </div>
        <div class="rail-stage" style="display: flex; flex-direction: column; flex: 1; min-height: 0; height: 100%;">
          <style>
            .left-rail { align-content: stretch !important; display: flex !important; flex-direction: column !important; }
            .rail-list { padding-bottom: 24px; }
            .user-library-details summary, .core-source-details summary { cursor: pointer; user-select: none; }
            .user-library-details summary::-webkit-details-marker, .core-source-details summary::-webkit-details-marker { margin-right: 6px; }
          </style>

          <div class="left-rail-page active" data-rail-page="library" style="display: flex; flex-direction: column; flex: 1; min-height: 0; height: 100%;">
          <details class="core-source-details" style="margin-bottom: 16px; flex-shrink: 0; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; background: rgba(255,255,255,0.5);">
            <summary style="font-size: 13px; font-weight: 700; color: var(--ink);">
              기반 소스: OpenShift 4.20
            </summary>
            <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 4px;">
              <div style="font-size: 12px; color: var(--ink); padding: 8px 10px; background: rgba(0,0,0,0.04); border-radius: 6px; pointer-events: none; font-weight: 600;">OpenShift 4.20 공식 문서 (활성)</div>
              <div style="font-size: 12px; color: var(--muted); padding: 8px 10px; opacity: 0.6; pointer-events: none;">OpenShift 4.18 공식 문서</div>
              <div style="font-size: 12px; color: var(--muted); padding: 8px 10px; opacity: 0.6; pointer-events: none;">OpenShift 4.16 공식 문서</div>
            </div>
          </details>

          <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; line-height: 1.6;">
            현재 제품 기준 활성 표면은 기본 OCP 4.20 코퍼스, 채팅, 참조 문서, 상황실입니다.
          </div>

          </div>
          <div class="left-rail-page" data-rail-page="friendly_trace" style="display: none; padding: 16px; overflow-y: auto; height: 100%;">
            <div class="friendly-stepper-container" id="friendly-stepper-container" style="height: 100%;">
              <div class="trace-empty" style="text-align: center; color: var(--muted); padding-top: 40px; font-size: 14px;">질문을 보내거나 말풍선을 클릭하면<br>상황실 모니터가 켜집니다.</div>
            </div>
          </div>
          <!-- JS 의존성 유지를 위한 숨김 요소들 -->
          <div hidden>
            <details id="core-version-picker"></details>
            <div id="active-pack-title"></div>
            <div id="pack-stack"></div>
            <div id="core-source-summary"></div>
          </div>
        </div>
      </aside>

      <div class="card chat-panel">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 16px;">
          <style>
            .header-toggle-btn {
              background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm);
              width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
              cursor: pointer; color: var(--muted); transition: all 0.2s;
            }
            .header-toggle-btn:hover { background: rgba(0,0,0,0.05); color: var(--ink); }
            .header-toggle-btn svg { width: 18px; height: 18px; fill: currentColor; }
            
            .toggle-left-hidden { opacity: 0; pointer-events: none; width: 0; transform: scale(0.8); transition: all 0.2s; }
            .shell.left-hidden .toggle-left-hidden { opacity: 1; pointer-events: auto; width: 32px; transform: scale(1); margin-right: 8px; }

            .toggle-right-hidden { opacity: 0; pointer-events: none; width: 0; transform: scale(0.8); transition: all 0.2s; }
            .shell.source-hidden .toggle-right-hidden { opacity: 1; pointer-events: auto; width: 32px; transform: scale(1); }
          </style>

          <div style="display: flex; align-items: center;">
            <button type="button" class="header-toggle-btn toggle-left-hidden" id="left-panel-toggle-btn" aria-label="왼쪽 패널 열기" title="왼쪽 패널 열기">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 3.5 10.5 8 6 12.5"></path></svg>
            </button>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: -0.01em;">채팅</h2>
          </div>
          
          <button type="button" class="header-toggle-btn toggle-right-hidden" id="source-panel-edge-btn" aria-label="참조 패널 열기" title="참조 패널 열기">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10 3.5 5.5 8 10 12.5"></path></svg>
          </button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer-shell">
          <div class="composer-samples" id="composer-samples"></div>
          <div class="composer">
            <textarea id="composer" rows="1" placeholder="무엇이 궁금한가요?"></textarea>
            <div class="composer-footer">
              <button type="button" class="primary" id="send-btn">전송</button>
            </div>
          </div>
        </div>
      </div>

      <aside class="card side-panel">
        <div class="inspector-header">
          <div class="inspector-title">
            <strong>참조</strong>
          </div>
          <button type="button" class="panel-icon-btn" id="source-panel-toggle-btn" aria-label="참조 패널 닫기"
            title="참조 패널 닫기"><svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M6 3.5 10.5 8 6 12.5"></path>
            </svg></button>
        </div>
        <div class="inspector-page active" data-study-page="source">
          <section class="source-frame-shell" hidden>
            <iframe class="source-viewer-frame" id="source-viewer-frame" title="선택한 참조" loading="lazy"
              hidden></iframe>
          </section>
        </div>
      </aside>
    </section>

  </div>

  <script src="/assets/app-config.js"></script>
  <script src="/assets/app-shell-state.js"></script>
  <script src="/assets/shell-helpers.js"></script>
  <script src="/assets/app-bootstrap-events.js"></script>
  <script src="/assets/app-bootstrap.js"></script>
  <script src="/assets/workspace-state.js"></script>
  <script src="/assets/panel-controller.js"></script>
  <script src="/assets/chat-renderer.js"></script>
  <script src="/assets/message-shells.js"></script>
  <script src="/assets/chat-session.js"></script>
  <script src="/assets/diagnostics-renderer.js"></script>
  <script>
    const APP_CONFIG = window.OCP_PLAY_STUDIO_CONFIG || {};
    const DEFAULT_CORE_PACKS = [
      { version: "4.20", label: "4.20", activeState: "사용 중", inactiveState: "선택", default: true }
    ];
    const DEFAULT_EMPTY_STATE_SAMPLES = [
      {
        label: "etcd 백업 절차",
        query: "etcd 백업은 어떻게 하나?",
      },
    {
      label: "노드 사용량 확인",
      query: "oc adm top nodes는 언제 써?",
      },
      {
        label: "Route / Ingress 차이",
        query: "Route와 Ingress 차이가 뭐야?",
      },
      {
        label: "namespace admin 권한",
        query: "특정 namespace에 admin 권한 주는 법 알려줘",
      },
    {
      label: "Terminating 프로젝트 정리",
      query: "프로젝트가 Terminating에서 안 지워질 때 어떻게 해?",
    },
    {
      label: "아키텍처 소개",
      query: "OpenShift 아키텍처를 처음 설명해줘",
    },
    {
      label: "Operator 기본 개념",
      query: "Operator가 뭐고 왜 필요한가?",
      },
    ];
    const CORE_PACKS = Array.isArray(APP_CONFIG.corePacks) && APP_CONFIG.corePacks.length
      ? APP_CONFIG.corePacks
      : DEFAULT_CORE_PACKS;
    const EMPTY_STATE_SAMPLES = Array.isArray(APP_CONFIG.emptyStateSamples) && APP_CONFIG.emptyStateSamples.length
      ? APP_CONFIG.emptyStateSamples
      : DEFAULT_EMPTY_STATE_SAMPLES;

    const appShellState = window.createAppShellState({
      corePacks: CORE_PACKS,
    });
    const refs = appShellState.refs;

    const state = appShellState.state;
    const shellHelpers = window.createShellHelpers({
      state,
      refs,
    });
    const appBootstrap = window.createAppBootstrap({
      state,
      refs,
      constants: {
        corePacks: CORE_PACKS,
        emptyStateSamples: EMPTY_STATE_SAMPLES,
        pipelineLabels: appShellState.constants.pipelineLabels,
        pipelineStageOrder: appShellState.constants.pipelineStageOrder,
      },
      helpers: shellHelpers,
    });
    appBootstrap.initialize();
  </script>
</body>

</html>
