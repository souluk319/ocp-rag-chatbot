<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCP 운영/교육 가이드 챗봇</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel-soft: #f8f9fb;
      --ink: #111418;
      --ink-soft: #4d5562;
      --ink-faint: #707885;
      --line: #d9dee7;
      --line-strong: #c7ceda;
      --brand: #ee0000;
      --brand-deep: #c9190b;
      --brand-soft: #fff1f0;
      --graphite: #1f2937;
      --success: #2f855a;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --content-width: 880px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(238, 0, 0, 0.05), transparent 22%),
        linear-gradient(180deg, #f7f8fa 0%, #f3f4f6 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans KR", "IBM Plex Sans", "Segoe UI Variable", "Malgun Gothic", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
      background: rgba(247, 248, 250, 0.92);
      border-bottom: 1px solid rgba(217, 222, 231, 0.92);
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow-sm);
      flex: 0 0 auto;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .brand-title {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-chip,
    .session-chip,
    .inspect-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink-soft);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex: 0 0 auto;
    }

    .status-chip[data-tone="working"] .status-dot {
      background: var(--brand);
    }

    .status-chip[data-tone="caution"] .status-dot {
      background: #d97706;
    }

    .status-chip[data-tone="danger"] .status-dot {
      background: #c9190b;
    }

    .session-chip strong {
      color: var(--ink);
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-sm);
    }

    .mode-toggle button {
      height: 30px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--ink-soft);
      font-weight: 700;
    }

    .mode-toggle button.active {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff;
    }

    .app-main {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 24px 28px;
      gap: 18px;
    }

    .feed-shell {
      min-height: 0;
      display: flex;
      justify-content: center;
    }

    .messages {
      width: 100%;
      max-width: var(--content-width);
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 6px 6px 0;
    }

    .empty-state {
      align-self: stretch;
      margin-top: 34px;
      padding: 32px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(249, 250, 252, 0.96) 100%);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .empty-head {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .empty-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff;
      font-weight: 800;
      box-shadow: var(--shadow-sm);
      flex: 0 0 auto;
    }

    .empty-title {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .empty-copy {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.7;
      max-width: 64ch;
    }

    .empty-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-tag,
    .starter-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
    }

    .meta-tag {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--ink-soft);
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .starter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .starter-card {
      border-radius: 18px;
      padding: 18px 18px 16px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .starter-label {
      color: var(--ink-faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .starter-text {
      font-size: 17px;
      line-height: 1.5;
      font-weight: 700;
      color: var(--ink);
    }

    .starter-subtext {
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.55;
    }

    .turn {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .turn.user {
      align-items: flex-end;
    }

    .turn.assistant {
      align-items: flex-start;
    }

    .bubble {
      max-width: min(760px, 88%);
      border-radius: 24px;
      padding: 18px 20px;
      line-height: 1.75;
      box-shadow: var(--shadow-sm);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: linear-gradient(180deg, #273243 0%, #1f2937 100%);
      color: #fff;
      border: 1px solid rgba(31, 41, 55, 0.14);
    }

    .bubble.assistant {
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .bubble-label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink-faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .turn.user .bubble-label {
      color: rgba(255, 255, 255, 0.72);
    }

    .answer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-left: 4px;
    }

    .answer-meta .meta-tag {
      background: var(--panel-soft);
    }

    .sources {
      width: min(760px, 88%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sources-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink-faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-left: 4px;
    }

    .source-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .source-link {
      color: #005c73;
      text-decoration: none;
      font-size: 17px;
      line-height: 1.5;
      font-weight: 800;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .source-book {
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .source-excerpt {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.65;
    }

    .source-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source-tag {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--ink-soft);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .source-tag.policy-ko {
      background: #eef9f0;
      border-color: #c8e7cf;
      color: #20663a;
    }

    .source-tag.policy-en {
      background: #fff4e5;
      border-color: #f2d3a8;
      color: #a14d00;
    }

    .confidence-panel {
      width: min(760px, 88%);
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow-sm);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .confidence-panel.degraded {
      border-color: #f2d3a8;
      background: #fffaf2;
    }

    .confidence-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .confidence-title {
      font-size: 13px;
      line-height: 1.4;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .confidence-badge {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .confidence-badge.level-high {
      background: #eef9f0;
      border-color: #c8e7cf;
      color: #20663a;
    }

    .confidence-badge.level-medium {
      background: #f5f7fa;
      border-color: #d9dee7;
      color: #334155;
    }

    .confidence-badge.level-low,
    .confidence-badge.level-none {
      background: #fff4e5;
      border-color: #f2d3a8;
      color: #a14d00;
    }

    .confidence-copy {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.65;
    }

    .confidence-copy strong {
      color: var(--ink);
    }

    .followups {
      width: min(760px, 88%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .followups-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink-faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-left: 4px;
    }

    .followup-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .followup-chip {
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.98);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
      font-size: 14px;
      font-weight: 700;
      text-align: left;
    }

    .composer-shell {
      width: 100%;
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .composer-card {
      border: 1px solid var(--line-strong);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow-md);
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .composer-textarea {
      width: 100%;
      min-height: 116px;
      max-height: 260px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.7;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .composer-secondary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link-btn {
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .send-btn {
      height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(201, 25, 11, 0.18);
    }

    .link-btn:disabled,
    .send-btn:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .composer-footnote {
      color: var(--ink-faint);
      font-size: 13px;
      line-height: 1.5;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 30;
    }

    .inspect-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100vw);
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid var(--line);
      box-shadow: -24px 0 40px rgba(15, 23, 42, 0.12);
      transform: translateX(100%);
      transition: transform 180ms ease;
      z-index: 31;
      display: flex;
      flex-direction: column;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .inspect-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .drawer-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .drawer-title strong {
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .drawer-title span {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .drawer-close {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--ink-soft);
      font-size: 18px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .drawer-block {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-soft);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .drawer-block h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .drawer-block pre,
    .warning-text {
      margin: 0;
      color: var(--ink-soft);
      font-family: Consolas, "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .warning-text {
      font-family: inherit;
      color: #a14d00;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 960px) {
      .topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .app-main {
        padding: 16px;
      }

      .starter-grid {
        grid-template-columns: 1fr;
      }

      .bubble,
      .sources {
        max-width: 100%;
      }

      .composer-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .composer-secondary {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark">OCP</span>
          <div class="brand-copy">
            <div class="brand-title">OCP 운영/교육 가이드 챗봇</div>
            <div class="brand-subtitle">운영 질문과 학습 질문을 한국어 중심으로 답하고, 내부 문서 출처를 함께 제공합니다.</div>
          </div>
        </div>
        <div class="top-actions">
          <div class="status-chip"><span class="status-dot"></span><span id="status-text">준비됨</span></div>
          <div class="session-chip">세션 <strong id="session-id">-</strong></div>
          <div class="mode-toggle">
            <button type="button" class="active" data-mode="ops">운영</button>
            <button type="button" data-mode="learn">학습</button>
          </div>
          <button type="button" class="inspect-btn" id="inspect-btn">검토</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="feed-shell">
        <div class="messages" id="messages" aria-live="polite"></div>
      </section>

      <section class="composer-shell">
        <div class="composer-card">
          <label class="sr-only" for="composer">질문 입력</label>
          <textarea id="composer" class="composer-textarea" placeholder="예: 현재 Pod에 적용된 SCC를 어떻게 확인하고, anyuid 권한이 필요할 때는 어떻게 설정해?"></textarea>
          <div class="composer-actions">
            <div class="composer-secondary">
              <button type="button" class="link-btn" id="reset-btn">세션 초기화</button>
              <button type="button" class="link-btn" id="regenerate-btn" disabled>다시 생성</button>
              <button type="button" class="link-btn" id="stop-btn" disabled>중지</button>
            </div>
            <button type="button" class="send-btn" id="send-btn">질문 보내기</button>
          </div>
          <div class="composer-footnote">Enter 전송, Shift+Enter 줄바꿈. 답변 아래 내부 문서 출처를 통해 근거를 바로 확인할 수 있습니다.</div>
        </div>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <aside class="inspect-drawer" id="inspect-drawer" aria-hidden="true">
      <div class="drawer-header">
        <div class="drawer-title">
          <strong>검토 정보</strong>
          <span>현재 턴의 rewritten query, 세션 상태, 경고 메시지를 확인합니다.</span>
        </div>
        <button type="button" class="drawer-close" id="close-inspect-btn" aria-label="검토 패널 닫기">×</button>
      </div>
      <div class="drawer-content">
        <section class="drawer-block">
          <h2>Rewritten Query</h2>
          <pre id="rewritten-query">-</pre>
        </section>
        <section class="drawer-block">
          <h2>Session Context</h2>
          <pre id="session-context">-</pre>
        </section>
        <section class="drawer-block">
          <h2>Warnings</h2>
          <div class="warning-text" id="warnings">없음</div>
        </section>
      </div>
    </aside>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const composerEl = document.getElementById("composer");
    const sendBtn = document.getElementById("send-btn");
    const stopBtn = document.getElementById("stop-btn");
    const resetBtn = document.getElementById("reset-btn");
    const regenerateBtn = document.getElementById("regenerate-btn");
    const inspectBtn = document.getElementById("inspect-btn");
    const closeInspectBtn = document.getElementById("close-inspect-btn");
    const inspectDrawer = document.getElementById("inspect-drawer");
    const drawerBackdrop = document.getElementById("drawer-backdrop");
    const statusChipEl = document.querySelector(".status-chip");
    const statusTextEl = document.getElementById("status-text");
    const sessionIdEl = document.getElementById("session-id");
    const rewrittenQueryEl = document.getElementById("rewritten-query");
    const sessionContextEl = document.getElementById("session-context");
    const warningsEl = document.getElementById("warnings");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));

    let sessionId = crypto.randomUUID();
    let currentMode = "ops";
    let currentController = null;
    let currentTyper = null;
    let currentProgressTimer = null;
    let lastQuery = "";

    sessionIdEl.textContent = sessionId.slice(0, 8);

    function suggestionButtons() {
      return Array.from(document.querySelectorAll("[data-suggestion]"));
    }

    function clearProgressTimer() {
      if (currentProgressTimer) {
        clearInterval(currentProgressTimer);
        currentProgressTimer = null;
      }
    }

    function setStatus(text, tone = "ready") {
      statusTextEl.textContent = text;
      statusChipEl.dataset.tone = tone;
    }

    function setGenerating(next) {
      sendBtn.disabled = next;
      resetBtn.disabled = next;
      regenerateBtn.disabled = next || !lastQuery;
      stopBtn.disabled = !next;
      suggestionButtons().forEach((button) => {
        button.disabled = next;
      });
    }

    function setMode(mode) {
      currentMode = mode;
      modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function openInspectDrawer() {
      inspectDrawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      inspectDrawer.setAttribute("aria-hidden", "false");
    }

    function closeInspectDrawer() {
      inspectDrawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      inspectDrawer.setAttribute("aria-hidden", "true");
    }

    function clearEmptyState() {
      const empty = document.getElementById("empty-state");
      if (empty) empty.remove();
    }

    function createTurn(role, text) {
      const turn = document.createElement("article");
      turn.className = `turn ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;

      const label = document.createElement("span");
      label.className = "bubble-label";
      label.textContent = role === "assistant" ? "답변" : "질문";

      const body = document.createElement("div");
      body.textContent = text;

      bubble.append(label, body);
      turn.appendChild(bubble);
      messagesEl.appendChild(turn);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { turn, body };
    }

    function renderSourceTag(label, className = "") {
      const tag = document.createElement("span");
      tag.className = `source-tag ${className}`.trim();
      tag.textContent = label;
      return tag;
    }

    function confidenceLabel(level) {
      if (level === "high") return "근거 강함";
      if (level === "medium") return "근거 보통";
      if (level === "low") return "검토 필요";
      return "근거 부족";
    }

    function renderConfidencePanel(turn, payload) {
      if (!payload.confidence) return;

      const panel = document.createElement("section");
      panel.className = `confidence-panel ${payload.confidence.degraded ? "degraded" : ""}`.trim();

      const head = document.createElement("div");
      head.className = "confidence-head";

      const title = document.createElement("div");
      title.className = "confidence-title";
      title.textContent = payload.confidence.degraded
        ? "답변은 제공하지만, 그대로 단정하면 위험할 수 있습니다."
        : "현재 답변은 문서 근거를 기준으로 구성되었습니다.";

      const badge = document.createElement("span");
      badge.className = `confidence-badge level-${payload.confidence.level}`;
      badge.textContent = `${confidenceLabel(payload.confidence.level)} · ${Math.round((payload.confidence.score || 0) * 100)}점`;

      head.append(title, badge);

      const copy = document.createElement("div");
      copy.className = "confidence-copy";
      copy.innerHTML = payload.confidence.degraded
        ? `<strong>주의:</strong> ${payload.confidence.reason}`
        : payload.confidence.reason;

      panel.append(head, copy);
      turn.appendChild(panel);
    }

    function renderAssistantSources(turn, payload) {
      const meta = document.createElement("div");
      meta.className = "answer-meta";
      const tags = [
        createMetaTag(`모드 ${payload.mode === "learn" ? "학습" : "운영"}`),
        createMetaTag(`출처 ${payload.cited_indices.length}개`),
      ];
      if (payload.confidence) {
        tags.push(createMetaTag(`신뢰도 ${confidenceLabel(payload.confidence.level)}`));
      }
      meta.append(...tags);
      turn.appendChild(meta);

      renderConfidencePanel(turn, payload);

      if (!payload.citations.length) {
        return;
      }

      const sources = document.createElement("section");
      sources.className = "sources";

      const label = document.createElement("div");
      label.className = "sources-label";
      label.innerHTML = "<span>내부 문서 출처</span><span>클릭하면 내부 문서가 열립니다</span>";
      sources.appendChild(label);

      payload.citations.forEach((citation) => {
        const card = document.createElement("div");
        card.className = "source-card";

        const link = document.createElement("a");
        link.className = "source-link";
        link.href = citation.href;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = `[${citation.index}] ${citation.section}`;

        const book = document.createElement("div");
        book.className = "source-book";
        book.textContent = citation.book_slug;

        const excerpt = document.createElement("div");
        excerpt.className = "source-excerpt";
        excerpt.textContent = citation.excerpt || "";

        const tags = document.createElement("div");
        tags.className = "source-tags";
        tags.appendChild(renderSourceTag("내부 문서"));

        if (citation.language_policy && citation.language_policy.badge) {
          const isEnglish = String(citation.language_policy.badge).includes("영문");
          tags.appendChild(
            renderSourceTag(
              citation.language_policy.badge,
              isEnglish ? "policy-en" : "policy-ko"
            )
          );
        }

        if (citation.language_policy && citation.language_policy.message) {
          tags.appendChild(renderSourceTag(citation.language_policy.message));
        }

        card.append(link, book, excerpt, tags);
        sources.appendChild(card);
      });

      turn.appendChild(sources);
    }

    function createMetaTag(label) {
      const tag = document.createElement("span");
      tag.className = "meta-tag";
      tag.textContent = label;
      return tag;
    }

    function uniqueSuggestions(items) {
      const seen = new Set();
      return items.filter((item) => {
        const normalized = String(item || "").trim();
        if (!normalized) return false;
        const key = normalized.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      }).slice(0, 3);
    }

    function buildFollowUpSuggestions(query, payload) {
      const q = String(query || "").toLowerCase();
      const books = new Set((payload.citations || []).map((citation) => String(citation.book_slug || "")));

      if (q.includes("아키텍처") || books.has("architecture")) {
        return [
          "Control Plane과 Worker Node 차이를 설명해줘",
          "OpenShift 네트워크 구조를 같이 설명해줘",
          "초보자 기준으로 OpenShift 구성요소를 정리해줘",
        ];
      }

      if (q.includes("etcd") || books.has("etcd")) {
        return [
          "etcd 복구 절차도 같이 설명해줘",
          "etcd 백업할 때 주의할 점은 뭐야?",
          "정기 백업 운영 기준을 추천해줘",
        ];
      }

      if (q.includes("scc") || q.includes("anyuid") || books.has("authentication_and_authorization")) {
        return [
          "특정 ServiceAccount에 SCC를 부여하는 명령어를 알려줘",
          "anyuid 대신 더 안전한 방법은 뭐야?",
          "현재 Pod에 적용된 SCC를 YAML에서 확인하는 방법도 알려줘",
        ];
      }

      if (q.includes("machine config operator") || q.includes("mco") || books.has("machine_configuration")) {
        return [
          "MachineConfigPool과 함께 설명해줘",
          "노드 설정 변경이 어떻게 롤아웃되는지 알려줘",
          "운영 관점에서 MCO를 볼 때 중요한 포인트는 뭐야?",
        ];
      }

      if (q.includes("로그") || q.includes("log")) {
        return [
          "애플리케이션 Pod 로그를 보는 명령어를 알려줘",
          "노드 로그를 확인하는 방법을 알려줘",
          "컨트롤 플레인 로그를 볼 때 어디부터 확인해?",
        ];
      }

      if (payload.citations && payload.citations.length) {
        return [
          "이 절차를 운영 체크리스트 형태로 정리해줘",
          "이 내용에서 가장 중요한 주의점 3가지만 뽑아줘",
          "관련된 다음 문서도 같이 추천해줘",
        ];
      }

      return [
        "질문 범위를 조금 더 구체적으로 좁혀서 다시 물어볼게",
        "관련 명령어 기준으로 다시 설명해줘",
        "운영 관점에서 필요한 절차만 간단히 알려줘",
      ];
    }

    function renderFollowUpSuggestions(turn, query, payload) {
      const suggestions = uniqueSuggestions(buildFollowUpSuggestions(query, payload));
      if (!suggestions.length) return;

      const section = document.createElement("section");
      section.className = "followups";

      const label = document.createElement("div");
      label.className = "followups-label";
      label.innerHTML = "<span>이어서 물어볼 질문</span><span>바로 이어서 확인할 수 있습니다</span>";
      section.appendChild(label);

      const chips = document.createElement("div");
      chips.className = "followup-chips";

      suggestions.forEach((text) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "followup-chip";
        button.textContent = text;
        button.addEventListener("click", () => {
          composerEl.value = text;
          autosizeComposer();
          composerEl.focus();
        });
        chips.appendChild(button);
      });

      section.appendChild(chips);
      turn.appendChild(section);
    }

    function startProgressTicker(element) {
      clearProgressTimer();
      const stages = [
        { status: "질문 정리 중", text: "질문을 정리하고 있습니다..." },
        { status: "문서 검색 중", text: "관련 문서를 찾고 있습니다..." },
        { status: "근거 확인 중", text: "근거를 확인하고 있습니다..." },
        { status: "답변 작성 중", text: "답변을 정리하고 있습니다..." },
      ];
      let index = 0;
      element.textContent = stages[0].text;
      setStatus(stages[0].status, "working");
      currentProgressTimer = setInterval(() => {
        index = (index + 1) % stages.length;
        element.textContent = stages[index].text;
        setStatus(stages[index].status, "working");
      }, 700);
    }

    function finalStatusForPayload(payload) {
      if (payload.confidence && payload.confidence.degraded) {
        return { text: "검토 필요", tone: "caution" };
      }
      if (payload.warnings && payload.warnings.length) {
        return { text: "주의 있음", tone: "caution" };
      }
      return { text: "완료", tone: "ready" };
    }

    function updateInspectPanel(payload) {
      rewrittenQueryEl.textContent = payload.rewritten_query || "-";
      sessionContextEl.textContent = JSON.stringify(payload.context || {}, null, 2);
      warningsEl.textContent = payload.warnings && payload.warnings.length
        ? payload.warnings.join("\n")
        : "없음";
    }

    function autosizeComposer() {
      composerEl.style.height = "auto";
      composerEl.style.height = `${Math.min(composerEl.scrollHeight, 260)}px`;
    }

    async function typeText(element, text) {
      clearProgressTimer();
      if (currentTyper) {
        clearInterval(currentTyper);
        currentTyper = null;
      }

      element.textContent = "";
      const safeText = text || "답변이 비어 있습니다.";
      let index = 0;

      await new Promise((resolve) => {
        currentTyper = setInterval(() => {
          index += 5;
          element.textContent = safeText.slice(0, index);
          messagesEl.scrollTop = messagesEl.scrollHeight;
          if (index >= safeText.length) {
            clearInterval(currentTyper);
            currentTyper = null;
            resolve();
          }
        }, 10);
      });
    }

    async function sendMessage({ query, regenerate = false } = {}) {
      const trimmed = (query ?? composerEl.value).trim();
      if (!trimmed && !regenerate) return;

      if (!regenerate) {
        clearEmptyState();
        createTurn("user", trimmed);
        composerEl.value = "";
        autosizeComposer();
        lastQuery = trimmed;
      }

      const { turn, body } = createTurn("assistant", "");
      setGenerating(true);
      startProgressTicker(body);
      currentController = new AbortController();

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            query: trimmed,
            mode: currentMode,
            regenerate,
          }),
          signal: currentController.signal,
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "응답 생성 실패");
        }

        sessionId = payload.session_id;
        sessionIdEl.textContent = sessionId.slice(0, 8);
        await typeText(body, payload.answer);
        renderAssistantSources(turn, payload);
        renderFollowUpSuggestions(turn, trimmed, payload);
        updateInspectPanel(payload);
        const finalStatus = finalStatusForPayload(payload);
        setStatus(finalStatus.text, finalStatus.tone);
      } catch (error) {
        clearProgressTimer();
        if (error.name === "AbortError") {
          body.textContent = "응답 생성을 중단했습니다.";
          setStatus("중단됨", "caution");
        } else {
          body.textContent = error.message || "오류가 발생했습니다.";
          setStatus("오류", "danger");
        }
      } finally {
        currentController = null;
        setGenerating(false);
      }
    }

    async function resetSession() {
      clearProgressTimer();
      const response = await fetch("/api/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId }),
      });
      const payload = await response.json();
      sessionId = payload.session_id;
      sessionIdEl.textContent = sessionId.slice(0, 8);
      messagesEl.innerHTML = "";
      rewrittenQueryEl.textContent = "-";
      sessionContextEl.textContent = JSON.stringify(payload.context || {}, null, 2);
      warningsEl.textContent = "없음";
      lastQuery = "";
      regenerateBtn.disabled = true;
      setStatus("세션 초기화 완료", "ready");
      renderEmptyState();
    }

    function makeStarterCard(label, text, subtext) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "starter-card";
      button.dataset.suggestion = text;

      const eyebrow = document.createElement("div");
      eyebrow.className = "starter-label";
      eyebrow.textContent = label;

      const title = document.createElement("div");
      title.className = "starter-text";
      title.textContent = text;

      const copy = document.createElement("div");
      copy.className = "starter-subtext";
      copy.textContent = subtext;

      button.append(eyebrow, title, copy);
      button.addEventListener("click", () => {
        composerEl.value = text;
        autosizeComposer();
        composerEl.focus();
      });
      return button;
    }

    function renderEmptyState() {
      clearEmptyState();

      const empty = document.createElement("section");
      empty.className = "empty-state";
      empty.id = "empty-state";

      const head = document.createElement("div");
      head.className = "empty-head";

      const mark = document.createElement("div");
      mark.className = "empty-mark";
      mark.textContent = "OCP";

      const title = document.createElement("div");
      title.className = "empty-title";
      title.textContent = "운영 질문과 학습 질문을 모두 받을 수 있습니다.";

      head.append(mark, title);

      const copy = document.createElement("div");
      copy.className = "empty-copy";
      copy.textContent = "운영 이슈, 개념 설명, follow-up 질문까지 같은 세션에서 이어서 확인할 수 있습니다. 답변 아래 내부 문서 출처를 통해 근거를 바로 확인할 수 있습니다.";

      const meta = document.createElement("div");
      meta.className = "empty-meta";
      meta.append(
        createMetaTag("내부 문서"),
        createMetaTag("멀티턴 지원"),
        createMetaTag("운영/학습 모드")
      );

      const starters = document.createElement("div");
      starters.className = "starter-grid";
      starters.append(
        makeStarterCard("Concept", "OpenShift 아키텍처를 설명해줘", "처음 보는 사람도 이해할 수 있게 핵심 구조를 설명합니다."),
        makeStarterCard("Operations", "etcd 백업은 어떻게 해?", "절차와 주의점을 바로 확인할 수 있는 운영 질문입니다."),
        makeStarterCard("Security", "현재 Pod에 적용된 SCC를 어떻게 확인해?", "실무형 권한 확인 질문으로 명령어와 근거 문서를 함께 볼 수 있습니다."),
        makeStarterCard("Platform", "Machine Config Operator가 뭐 하는 거야?", "핵심 컴포넌트 역할을 빠르게 이해하는 데 적합합니다.")
      );

      empty.append(head, copy, meta, starters);
      messagesEl.appendChild(empty);
    }

    composerEl.addEventListener("input", autosizeComposer);
    composerEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", () => sendMessage());
    regenerateBtn.addEventListener("click", () => sendMessage({ query: lastQuery, regenerate: true }));
    stopBtn.addEventListener("click", () => {
      clearProgressTimer();
      if (currentController) currentController.abort();
      if (currentTyper) {
        clearInterval(currentTyper);
        currentTyper = null;
      }
    });
    resetBtn.addEventListener("click", resetSession);
    inspectBtn.addEventListener("click", openInspectDrawer);
    closeInspectBtn.addEventListener("click", closeInspectDrawer);
    drawerBackdrop.addEventListener("click", closeInspectDrawer);

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeInspectDrawer();
      }
    });

    setGenerating(false);
    setMode(currentMode);
    sessionContextEl.textContent = JSON.stringify({ mode: currentMode, ocp_version: "4.20" }, null, 2);
    autosizeComposer();
    renderEmptyState();
  </script>
</body>
</html>
